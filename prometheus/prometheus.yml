global:
  scrape_interval: 5s
  evaluation_interval: 15s
  scrape_timeout: 5s

rule_files:
  - alert.yml

scrape_configs:
  - job_name: 'microservices'
    static_configs:
      - targets:
        - clock-service:3000
        - mail-service:3000
        - read-service:3000
        - score-service:3000
        - submission-service:3000
        - target-service:3000
        - api-gateway:3000
