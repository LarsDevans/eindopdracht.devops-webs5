services:
  mysql-service:
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    image: mysql:9
    networks:
      - snapnet
    ports:
      - '${MYSQL_PORT}:3306'
    restart: unless-stopped

  target-service:
    build:
      args:
        SERVICE: ${SERVICE_TARGET_SERVICE}
    environment:
      - NODE_ENV=${NODE_ENV}
      - DB_NAME=${MYSQL_TARGET_DB}
      - DB_HOST=http://mysql-service
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_PORT=${MYSQL_PORT}
      - DB_USER=${MYSQL_ROOT_USER}
    networks:
      - snapnet
    ports:
      - '${TARGET_SERVICE_PORT}:3000'
    restart: unless-stopped
